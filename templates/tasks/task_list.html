<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.add-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.add-box input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

.add-box button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.add-box button:hover{
    background:#43a047;
}

.todo-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.todo-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f8f8f8;
    padding:12px;
    border-radius:8px;
}

.todo-item.done span{
    text-decoration:line-through;
    color:#888;
}

.actions{
    display:flex;
    gap:6px;
}

.actions button{
    border:none;
    padding:7px 10px;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-size:13px;
}

.edit{
    background:#2196F3;
}

.done{
    background:#4CAF50;
}

.delete{
    background:#f44336;
}

.actions button:hover{
    opacity:.9;
}
</style>

</head>
<body>

<div class="container">

    <h1>Todo App</h1>

    <form class="add-box" method="POST" action="{% url 'task-create' %}">
        {% csrf_token %}
        <input type="text" name="content" placeholder="Enter a task...">
        <button type="submit">Add</button>
    </form>

    <div class="todo-list">
        {% for task in tasks %}
        <div class="todo-item">
            {% if task.done %}
            <span style="text-decoration: line-through;">{{ task.content }}</span>
            {% else %}
            <span>{{ task.content }}</span>
            {% endif %}
            <div class="actions">
                <a href="{% url 'task-edit' pk=task.id %}">
                    <button class="edit">Edit</button>
                </a>
                <form method="get" action="{% url 'task-done' pk=task.id %}">
                    {% csrf_token %}
                    <button class="done">Done</button>
                </form>
                <form method="post" action="{% url 'task-delete' pk=task.id %}">
                    {% csrf_token %}
                    <button class="delete">Delete</button>
                </form>
                
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
